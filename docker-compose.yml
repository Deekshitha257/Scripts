version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: metabase-postgres
    restart: always
    environment:
      
      POSTGRES_DB: metabase_db
      POSTGRES_USER: search_sandbox
      POSTGRES_PASSWORD: search_sandbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - metabase-network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    depends_on:
      - postgres
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: search_sandbox
      MB_DB_PASS: search_sandbox
      MB_DB_HOST: 172.168.168.232
    ports:
      - "3000:3000"
    networks:
      - metabase-network

volumes:
  postgres_data:

networks:
  metabase-network:
    driver: bridge
